<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特别的祝福</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* 1. 背景修改：保持与上一页一致的星空背景 */
      background-color: #000;
      /* 1. 先设置一个保底的渐变色 (放在图片前面，这样如果图片透明或没加载，它会在下面) */
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);

      background-image: url('月亮.jpg'); /* 请确保图片在同一目录下 */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      
      font-family: "Microsoft YaHei", Arial, sans-serif;
      padding: 20px;
      overflow: hidden; /* 防止出现滚动条影响沉浸感 */
    }

    /* 2. 容器修改：由白色改为磨砂玻璃风格 */
    .container {
      max-width: 900px;
      width: calc(100vw - 40px);
      min-width: 0;
      /* 核心：半透明深色背景 + 模糊滤镜 */
      background: rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(10px); 
      -webkit-backdrop-filter: blur(10px);
      
      border: 1px solid rgba(255, 255, 255, 0.1); /* 极细的边框 */
      border-radius: 20px;
      padding: 40px;
      
      /* 阴影改为发光感 */
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6); 
      
      /*animation: fadeIn 1.5s ease-out; 稍微放慢入场速度 */
      position: relative;
      z-index: 10;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      transition: opacity 1.5s ease-out, transform 1.5s ease-out;
    }
    .container.active {
    opacity: 1;
    transform: none; /* 关键：动画结束后，完全移除 transform 属性 */
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* 3. 标题修改：白色发光字体 */
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      letter-spacing: 2px;
      color: #fff;
      /* 移除原来的背景裁剪，改为文字阴影 */
      background: none;
      -webkit-text-fill-color: initial;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(100, 200, 255, 0.4);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      border-radius: 15px;
      /*overflow: hidden;*/
      background: #000;
      /* 给视频加一圈淡淡的光晕 */
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .play-button {
      position: absolute;
      inset: 0;
      border: 0;
      border-radius: 15px;
      color: #fff;
      background: rgba(0, 0, 0, 0.42);
      font-size: 18px;
      cursor: pointer;
      z-index: 2;
    }

    .play-button span {
      display: block;
      margin: 0 auto 10px;
      font-size: 52px;
    }

    .video-fallback {
      display: none;
      padding: 18px;
      color: #fff;
      text-align: center;
    }

    .video-fallback a {
      color: #fff;
      text-decoration: underline;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      outline: none;
    }

    /* 4. 文字修改：改为亮色 */
    .message {
      text-align: center;
      margin-top: 35px;
      color: rgba(255, 255, 255, 0.9); /* 亮白色 */
      font-size: 18px;
      line-height: 1.8;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .message p {
        margin-bottom: 10px;
        max-width: 100%;
        word-break: break-all;
    }

    .controls-info {
      text-align: center;
      margin-top: 15px;
      color: rgba(255, 255, 255, 0.5); /* 灰色说明文字 */
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* 装饰性背景光点（可选，增加氛围） */
    .glow-bg {
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(100,100,255,0.1) 0%, rgba(0,0,0,0) 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        pointer-events: none;
    }

    /* 移动端适配优化 */
    @media (max-width: 768px) {
        body {
            width: 100%;
            padding: 12px;
            align-items: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .container {
            width: calc(100vw - 24px);
            max-width: calc(100vw - 24px);
            min-width: 0;
            flex: none;
            padding: 18px 12px;
        }
        h1 {
            font-size: 22px;
            overflow-wrap: anywhere;
        }
        .message {
            width: 100%;
            overflow: hidden;
            font-size: 16px;
        }
        .message p {
            max-width: 100%;
            word-break: break-all;
            overflow-wrap: anywhere;
        }
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>

  <div class="container">
    <h1>✨ 特别的祝福送给特别的你 ✨</h1>
    
    <div class="video-wrapper">
      <button id="playButton" class="play-button" type="button" aria-label="播放祝福视频">
        <span>▶</span>点击播放祝福视频
      </button>
      <video 
      id="birthdayVideo"
      controls 
      preload="metadata"
      width="100%" 
      playsinline 
      webkit-playsinline
      x5-playsinline
      x5-video-player-type="h5-page"
      poster="月亮.jpg">
      <source src="../video/final-wechat.mp4" type="video/mp4">
      您的浏览器不支持视频播放。
      </video>
      <div id="videoFallback" class="video-fallback">
        视频加载失败，<a href="../video/final-wechat.mp4" target="_blank" rel="noopener">点这里直接打开视频</a>
      </div>
    </div>

    <div class="controls-info">
      💡 建议佩戴耳机观看以获得最佳体验
    </div>

    <div class="message">
      <p>亲爱的宝宝请你耐心看完这个视频哟！</p>
      <p>愿你的每一天都充满惊喜与快乐、都洋溢着幸福与欢笑 🎂</p>
      <p>每一段代码都有终止符，但你的故事是持续热更新的动态脚本！</p>
    </div>
  </div>

  <script>
    const video = document.getElementById('birthdayVideo');
    const container = document.querySelector('.container');
    const playButton = document.getElementById('playButton');
    const videoFallback = document.getElementById('videoFallback');

    playButton.addEventListener('click', function () {
      video.play().then(function () {
        playButton.style.display = 'none';
      }).catch(function () {
        videoFallback.style.display = 'block';
      });
    });

    video.addEventListener('play', function () {
      playButton.style.display = 'none';
    });

    video.addEventListener('pause', function () {
      if (!video.ended) playButton.style.display = 'block';
    });

    // 1. 入场动画（不等待视频加载，直接用DOMContentLoaded）
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
            container.offsetHeight;
            container.classList.add('active');
        });
    } else {
        // DOM已就绪，直接触发
        container.offsetHeight;
        container.classList.add('active');
    }

    // 2. 视频加载监听
    video.addEventListener('loadeddata', () => {
      console.log('视频加载完成');
    });

    // 3. 视频加载错误处理
    video.addEventListener('error', (e) => {
      console.error('视频加载失败:', e);
      playButton.style.display = 'none';
      videoFallback.style.display = 'block';
    });

    // 4. 双击视频区域强制全屏
    video.addEventListener('dblclick', function() {
        if (video.requestFullscreen) {
            video.requestFullscreen();
        } else if (video.webkitRequestFullscreen) { /* Safari */
            video.webkitRequestFullscreen();
        } else if (video.msRequestFullscreen) { /* IE11 */
            video.msRequestFullscreen();
        }
    });
</script>
</body>
</html>
